<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpotStar SignUp</title>
  <link rel="stylesheet" href="./signup.css">
  <link rel="shortcut icon" href="/Images/logo.png" type="image/x-icon">
</head>

<body>
  <nav>
    <div class="nav_left">
      <img src="/Images/logo.png" alt="" width="80px" height="80px">
      <h1>SpotStar</h1>
    </div>
  </nav>
  <main>
    <div>
      <h1>SignUp</h1>
      <form action="">
        <label for="">Name</label>
        <input type="text" placeholder="Enter Your Name" id="name">
        <label for="">Email</label>
        <input type="email" placeholder="Enter Your Email" id="email">
        <label for="">DOB</label>
        <input type="date" placeholder="Enter Your DOB" id="dob">
        <label for="">Password</label>
        <input type="password" placeholder="Enter Your Password" id="password">
        <label for="">confirm Password</label>
        <input type="password" placeholder="Re-Enter Your Password" id="confirmPassword">
        <button type="button" onclick="cancel()">Cancel</button>
        <button type="button" onclick="ok()">Submit</button>
      </form>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, setDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    const name = document.getElementById("name").value;
    const firebaseConfig = {
      apiKey: "AIzaSyDFXvFHRh-nqspHXcqR7WmB7iH7bgZpExo",
      authDomain: "spotstar-6ab0f.firebaseapp.com",
      projectId: "spotstar-6ab0f",
      storageBucket: "spotstar-6ab0f.firebasestorage.app",
      messagingSenderId: "811414072624",
      appId: "1:811414072624:web:dbe8c4befc0baf3fa66cf5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Submit Function
    window.ok = async function () {
      const name = document.querySelectorAll("input")[0].value;
      const email = document.querySelectorAll("input")[1].value;
      const dob = document.querySelectorAll("input")[2].value;
      const password = document.querySelectorAll("input")[3].value;
      const confirmPassword = document.querySelectorAll("input")[4].value;

      if (password !== confirmPassword) {
        alert("Passwords do not match");
        return;
      }

      try {
        // Create user
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Store extra data in Firestore
        await setDoc(doc(db, "users", user.uid), {
          name: name,
          email: email,
          dob: dob,
          password: password
        });

        alert("account created!");
        window.location.href = "/3_Successful/successful.html";

      } catch (error) {
        alert(error.message);
      }
    };

    window.cancel = function () {
      window.location.href = "/1_SignIn/signin.html";
    };
  </script>
</body>

</html>
