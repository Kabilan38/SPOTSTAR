<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpotStar SignUp</title>
    <link rel="stylesheet" href="./signup.css">
    <link rel="shortcut icon" href="/Images/logo.png" type="image/x-icon">
</head>
<body>
    <nav>
        <div class="nav_left">
            <img src="/Images/logo.png" alt="" width="80px" height="80px">
            <h1>SpotStar</h1>
        </div>
    </nav>
    <main>
        <div>
            <h1>SignUp</h1>
            <form action="">
                <label for="">Name</label>
                <input type="text" placeholder="Enter Your Name">
                <label for="">Email</label>
                <input type="email" placeholder="Enter Your Email">
                <label for="">Phone</label>
                <input type="tel" placeholder="Enter Your Phone Number">
                <label for="">DOB</label>
                <input type="date" placeholder="Enter Your DOB">
                <label for="">Password</label>
                <input type="password" placeholder="Enter Your Password">
                <label for="">confirm Password</label>
                <input type="password" placeholder="Re-Enter Your Password">
                <button type="button" onclick="cancel()">Cancel</button>
                <button type="button" onclick="ok()">Submit</button>                               
            </form> 
        </div>
    </main>
    <script>
        function cancel(){
            window.location.href="/1_SignIn/signin.html";
            
        }
        function ok(){
            window.location.href="/3_Successful/successful.html";
        }
    </script>
</body>
</html>
