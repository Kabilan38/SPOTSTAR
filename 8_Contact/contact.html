<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpotStar Contacts</title>
    <link rel="stylesheet" href="./contact.css">
    <link rel="shortcut icon" href="/Images/logo.png" type="image/x-icon">
</head>
<body>
    <nav>
        <div class="nav_left">
            <img src="/Images/logo.png" alt="" width="80px" height="80px">
            <h1>SpotStar</h1>
        </div>

        <div class="nav_right">
            <a href="/11_Movies/movies_home.html">Movies</a>
            <a href="/7_About/about.html">About</a>
            <a href="/10_Songs/songs_home.html">Songs</a>
        </div>
    </nav>
    <main>
        <div>
            <h1>Contact</h1>
            <form action="">
                <label for="">Name</label>
                <input type="text" placeholder="Enter Your Name">
                <label for="">Email</label>
                <input type="text" placeholder="Enter Your Email">
                <label for="">Message</label>
                <textarea name="" id="" placeholder="Enter Message"></textarea>
                <button onclick="back()" type="button">Cancel</button>
                <button onclick="ok()" type="button">Submit</button>                           
            </form> 
        </div>
    </main>

    <script>
        function back(){
            window.location.href = "/6_Home/home.html";
        }
        function ok(){
            window.location.href="/9_Response/response.html"
        }
    </script>
</body>
</html>
